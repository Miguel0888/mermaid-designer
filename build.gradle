plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'de.bund.zrb'
version = '1.0-SNAPSHOT'

// ── Java Toolchain: ensures compile + run BOTH use JDK 21 ─────────────
// Gradle auto-detects installed JDKs and picks the right one.
// This forces ALL tasks (compileJava, run, test) to use JDK 21,
// regardless of which JVM the Gradle daemon itself runs on.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

compileJava.options.encoding = 'UTF-8'
compileTestJava.options.encoding = 'UTF-8'

repositories {
    mavenCentral()
}

javafx {
    version = '21.0.2'
    modules = ['javafx.controls', 'javafx.web', 'javafx.swing']
}

dependencies {
    // Mermaid rendering engine (pure Java, GraalJS + Batik)
    implementation 'com.aresstack:mermaid-java:0.1.0-beta.1'

    // Rich text editor with syntax highlighting
    implementation 'org.fxmisc.richtext:richtextfx:0.11.3'

    // JSON serialization for document persistence
    implementation 'com.google.code.gson:gson:2.11.0'

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

application {
    // Use Launcher (not MermaidDesignerApp) to bypass the JVM's
    // JavaFX module-path check that fails on the classpath.
    mainClass = 'de.bund.zrb.Launcher'
}

// Ensure JavaFX modules are accessible in non-modular mode
run {
    jvmArgs += [
        '--add-opens', 'javafx.graphics/javafx.scene=ALL-UNNAMED',
        '--add-opens', 'javafx.controls/javafx.scene.control=ALL-UNNAMED'
    ]
}
